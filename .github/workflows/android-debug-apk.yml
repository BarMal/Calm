name: Android APKs

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build debug and release APKs
        run: ./gradlew :app:assembleDebug :app:assembleRelease --stacktrace

      - name: Prepare APKs
        run: |
          set -euo pipefail
          mkdir -p dist
          DEBUG_APK_PATH="$(find app/build/outputs/apk/debug -name '*.apk' | head -n 1)"
          RELEASE_APK_PATH="$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)"
          cp "$DEBUG_APK_PATH" dist/Calm-debug.apk
          cp "$RELEASE_APK_PATH" dist/Calm-release-unsigned.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Calm-apks
          path: |
            dist/Calm-debug.apk
            dist/Calm-release-unsigned.apk
          if-no-files-found: error

      - name: Generate release notes
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          set -euo pipefail
          {
            echo "Build for commit \`${GITHUB_SHA}\`."
            echo
            echo "Built from branch \`${GITHUB_REF_NAME}\`."
            echo
            echo "### APKs"
            echo "- Calm-debug.apk: debug build for direct testing"
            echo "- Calm-release-unsigned.apk: unsigned release build artifact"
            echo
            echo "### Recent changes"
            git log -10 --pretty=format:'- %s (%h)'
            echo
          } > dist/release-notes.md

      - name: Publish latest APK release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -f apks-latest "$GITHUB_SHA"
          git push -f origin apks-latest

          if gh release view apks-latest >/dev/null 2>&1; then
            gh release upload apks-latest dist/Calm-debug.apk dist/Calm-release-unsigned.apk --clobber
            gh release edit apks-latest \
              --title "Latest Calm APKs" \
              --notes-file dist/release-notes.md \
              --prerelease
          else
            gh release create apks-latest dist/Calm-debug.apk dist/Calm-release-unsigned.apk \
              --title "Latest Calm APKs" \
              --notes-file dist/release-notes.md \
              --prerelease \
              --target "$GITHUB_SHA"
          fi
