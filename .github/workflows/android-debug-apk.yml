name: Calm APK Check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: platform-tools platforms;android-36 build-tools;36.0.0

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Prepare CI debug signing key
        run: |
          set -euo pipefail
          git show c2bf7b1:app/ci-debug.keystore.base64 | base64 --decode > app/calm-ci-debug.keystore
          echo "CALM_CI_DEBUG_KEYSTORE_FILE=app/calm-ci-debug.keystore" >> "$GITHUB_ENV"

      - name: Compute APK version
        run: |
          set -euo pipefail
          VERSION_NAME_BASE="$(grep '^calm.versionNameBase=' gradle.properties | cut -d= -f2-)"
          VERSION_CODE="$(date -u +%y%j%H%M)"
          echo "VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_ENV"
          echo "VERSION_NAME=${VERSION_NAME_BASE}.${VERSION_CODE}" >> "$GITHUB_ENV"

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Prepare APKs
        run: |
          set -euo pipefail
          mkdir -p dist
          DEBUG_APK_PATH="$(find app/build/outputs/apk/debug -name '*.apk' | head -n 1)"
          cp "$DEBUG_APK_PATH" "dist/Calm-alpha-debug-side-by-side-${VERSION_NAME}-${VERSION_CODE}.apk"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Calm-alpha-apks
          path: |
            dist/Calm-alpha-*.apk
          if-no-files-found: error
