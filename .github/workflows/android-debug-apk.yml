name: Build and Publish Calm APKs

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Prepare CI signing key
        run: base64 --decode app/ci-debug.keystore.base64 > app/ci-debug.keystore

      - name: Compute APK version
        run: |
          set -euo pipefail
          echo "VERSION_CODE=$((1000 + GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"
          echo "VERSION_NAME=0.1.0-alpha.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Build debug and release APKs
        run: ./gradlew :app:assembleDebug :app:assembleRelease --stacktrace

      - name: Prepare APKs
        run: |
          set -euo pipefail
          mkdir -p dist release-assets
          DEBUG_APK_PATH="$(find app/build/outputs/apk/debug -name '*.apk' | head -n 1)"
          RELEASE_APK_PATH="$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)"

          cp "$RELEASE_APK_PATH" "dist/Calm-alpha-${VERSION_NAME}-${VERSION_CODE}.apk"
          cp "$DEBUG_APK_PATH" "dist/Calm-alpha-debug-side-by-side-${VERSION_NAME}-${VERSION_CODE}.apk"

          cp "dist/Calm-alpha-${VERSION_NAME}-${VERSION_CODE}.apk" release-assets/
          cp "$RELEASE_APK_PATH" release-assets/Calm-alpha-latest.apk
          cp "dist/Calm-alpha-debug-side-by-side-${VERSION_NAME}-${VERSION_CODE}.apk" release-assets/
          cp "$DEBUG_APK_PATH" release-assets/Calm-alpha-debug-side-by-side-latest.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Calm-alpha-apks
          path: |
            dist/Calm-alpha-*.apk
          if-no-files-found: error

      - name: Generate release notes
        if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          {
            echo "Alpha build for commit \`${GITHUB_SHA}\`."
            echo
            echo "Built from branch \`${GITHUB_REF_NAME}\` via \`${GITHUB_EVENT_NAME}\`."
            echo
            echo "Version: \`${VERSION_NAME}\` / code \`${VERSION_CODE}\`."
            echo
            echo "### Which APK should I install?"
            echo "- **Calm-alpha-latest.apk** updates the existing Calm install using package \`dev.barna.calm\`. Use this for normal alpha testing."
            echo "- **Calm-alpha-debug-side-by-side-latest.apk** installs separately using package \`dev.barna.calm.debug\`. Use this only when you intentionally want a second test copy."
            echo "- The versioned and latest files for the same channel are aliases of the same package. Install one normal APK and, optionally, one debug side-by-side APK."
            echo
            echo "### Versioned APKs"
            echo "- Calm-alpha-${VERSION_NAME}-${VERSION_CODE}.apk"
            echo "- Calm-alpha-debug-side-by-side-${VERSION_NAME}-${VERSION_CODE}.apk"
            echo
            echo "### Recent changes"
            git log -10 --pretty=format:'- %s (%h)'
            echo
          } > dist/release-notes.md

      - name: Publish latest APK release
        if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          gh release delete apks-latest --yes --cleanup-tag || true
          git tag -f apks-latest "$GITHUB_SHA"
          git push -f origin apks-latest

          gh release create apks-latest release-assets/*.apk \
            --title "Latest Calm Alpha APKs" \
            --notes-file dist/release-notes.md \
            --prerelease \
            --target "$GITHUB_SHA"
