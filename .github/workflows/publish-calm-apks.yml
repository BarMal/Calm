name: Publish Calm APKs

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish. Use a branch-specific tag for test builds."
        required: true
        default: apks-latest
      release_title:
        description: "Release title to show on GitHub."
        required: true
        default: Latest Calm Alpha APKs

permissions:
  contents: write

jobs:
  build:
    name: Build release APKs
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: platform-tools platforms;android-36 build-tools;36.0.0

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Prepare release signing key
        env:
          CALM_RELEASE_KEYSTORE_BASE64: ${{ secrets.CALM_RELEASE_KEYSTORE_BASE64 }}
          CALM_RELEASE_STORE_PASSWORD: ${{ secrets.CALM_RELEASE_STORE_PASSWORD }}
          CALM_RELEASE_KEY_ALIAS: ${{ secrets.CALM_RELEASE_KEY_ALIAS }}
          CALM_RELEASE_KEY_PASSWORD: ${{ secrets.CALM_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${CALM_RELEASE_KEYSTORE_BASE64}" || -z "${CALM_RELEASE_STORE_PASSWORD}" || -z "${CALM_RELEASE_KEY_ALIAS}" || -z "${CALM_RELEASE_KEY_PASSWORD}" ]]; then
            echo "Release signing secrets are required before publishing master APKs." >&2
            exit 1
          fi

          echo "${CALM_RELEASE_KEYSTORE_BASE64}" | base64 --decode > app/calm-release.keystore
          git show c2bf7b1:app/ci-debug.keystore.base64 | base64 --decode > app/calm-legacy-ci.keystore
          {
            echo "CALM_RELEASE_KEYSTORE_FILE=app/calm-release.keystore"
            echo "CALM_RELEASE_STORE_PASSWORD=${CALM_RELEASE_STORE_PASSWORD}"
            echo "CALM_RELEASE_KEY_ALIAS=${CALM_RELEASE_KEY_ALIAS}"
            echo "CALM_RELEASE_KEY_PASSWORD=${CALM_RELEASE_KEY_PASSWORD}"
            echo "CALM_LEGACY_KEYSTORE_FILE=app/calm-legacy-ci.keystore"
            echo "CALM_SIGNING_LINEAGE_FILE=app/calm-signing-lineage"
          } >> "$GITHUB_ENV"

      - name: Prepare signing certificate lineage
        run: |
          set -euo pipefail
          APKSIGNER="${ANDROID_HOME}/build-tools/36.0.0/apksigner"
          "${APKSIGNER}" rotate \
            --out "${CALM_SIGNING_LINEAGE_FILE}" \
            --old-signer \
            --ks "${CALM_LEGACY_KEYSTORE_FILE}" \
            --ks-key-alias calm-debug \
            --ks-pass pass:calmdebug \
            --key-pass pass:calmdebug \
            --set-installed-data true \
            --set-permission true \
            --set-rollback false \
            --new-signer \
            --ks "${CALM_RELEASE_KEYSTORE_FILE}" \
            --ks-key-alias "${CALM_RELEASE_KEY_ALIAS}" \
            --ks-pass env:CALM_RELEASE_STORE_PASSWORD \
            --key-pass env:CALM_RELEASE_KEY_PASSWORD

      - name: Compute APK version
        run: |
          set -euo pipefail
          mkdir -p release-metadata
          VERSION_NAME_BASE="$(grep '^calm.versionNameBase=' gradle.properties | cut -d= -f2-)"
          VERSION_CODE="$(date -u +%y%j%H%M)"
          echo "VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_ENV"
          echo "VERSION_NAME=${VERSION_NAME_BASE}.${VERSION_CODE}" >> "$GITHUB_ENV"
          {
            echo "VERSION_CODE=${VERSION_CODE}"
            echo "VERSION_NAME=${VERSION_NAME_BASE}.${VERSION_CODE}"
          } > release-metadata/version.env

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Build unsigned release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Prepare release assets
        run: |
          set -euo pipefail
          APKSIGNER="${ANDROID_HOME}/build-tools/36.0.0/apksigner"
          ZIPALIGN="${ANDROID_HOME}/build-tools/36.0.0/zipalign"
          mkdir -p dist release-assets release-metadata
          DEBUG_APK_PATH="$(find app/build/outputs/apk/debug -name '*.apk' | head -n 1)"
          UNSIGNED_RELEASE_APK_PATH="$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)"
          ALIGNED_RELEASE_APK_PATH="release-metadata/Calm-alpha-${VERSION_NAME}-${VERSION_CODE}-aligned-unsigned.apk"
          VERSIONED_RELEASE_APK="release-assets/Calm-alpha-${VERSION_NAME}-${VERSION_CODE}.apk"

          "${ZIPALIGN}" -f -p 4 "${UNSIGNED_RELEASE_APK_PATH}" "${ALIGNED_RELEASE_APK_PATH}"
          "${APKSIGNER}" sign \
            --rotation-min-sdk-version 28 \
            --out "${VERSIONED_RELEASE_APK}" \
            --lineage "${CALM_SIGNING_LINEAGE_FILE}" \
            --ks "${CALM_LEGACY_KEYSTORE_FILE}" \
            --ks-key-alias calm-debug \
            --ks-pass pass:calmdebug \
            --key-pass pass:calmdebug \
            --next-signer \
            --ks "${CALM_RELEASE_KEYSTORE_FILE}" \
            --ks-key-alias "${CALM_RELEASE_KEY_ALIAS}" \
            --ks-pass env:CALM_RELEASE_STORE_PASSWORD \
            --key-pass env:CALM_RELEASE_KEY_PASSWORD \
            "${ALIGNED_RELEASE_APK_PATH}"

          cp "$DEBUG_APK_PATH" "dist/Calm-alpha-debug-side-by-side-${VERSION_NAME}-${VERSION_CODE}.apk"
          cp "$DEBUG_APK_PATH" "release-assets/Calm-alpha-debug-side-by-side-${VERSION_NAME}-${VERSION_CODE}.apk"
          cp "$DEBUG_APK_PATH" release-assets/Calm-alpha-debug-side-by-side-latest.apk

          cp "${VERSIONED_RELEASE_APK}" "dist/Calm-alpha-${VERSION_NAME}-${VERSION_CODE}.apk"
          cp "${VERSIONED_RELEASE_APK}" release-assets/Calm-alpha-latest.apk

      - name: Verify release APK metadata
        run: |
          set -euo pipefail
          APKSIGNER="${ANDROID_HOME}/build-tools/36.0.0/apksigner"
          AAPT="${ANDROID_HOME}/build-tools/36.0.0/aapt"
          {
            echo "### APK verification"
            echo
            echo "| APK | Package | Version | SHA-256 | Signing certificate | Rotation lineage |"
            echo "| --- | --- | --- | --- | --- | --- |"
          } > release-metadata/apk-verification.md

          for apk in release-assets/*.apk; do
            "${APKSIGNER}" verify --verbose --print-certs "$apk" > "${apk}.apksigner.txt"
            "${AAPT}" dump badging "$apk" > "${apk}.badging.txt"
            package="$(sed -n "s/^package: name='\([^']*\)'.*/\1/p" "${apk}.badging.txt" | head -n 1)"
            version_name="$(sed -n "s/^package: .*versionName='\([^']*\)'.*/\1/p" "${apk}.badging.txt" | head -n 1)"
            version_code="$(sed -n "s/^package: .*versionCode='\([^']*\)'.*/\1/p" "${apk}.badging.txt" | head -n 1)"
            cert_digest="$(sed -n 's/^Signer #1 certificate SHA-256 digest: //p' "${apk}.apksigner.txt" | head -n 1)"
            rotated="$(grep -Eq 'Verified using v3 scheme .*true|Verified using v3.1 scheme .*true' "${apk}.apksigner.txt" && echo 'yes' || echo 'no')"
            sha256="$(sha256sum "$apk" | cut -d' ' -f1)"
            echo "| $(basename "$apk") | \`${package}\` | \`${version_name}\` / \`${version_code}\` | \`${sha256}\` | \`${cert_digest}\` | \`${rotated}\` |" >> release-metadata/apk-verification.md
          done

          cat release-metadata/apk-verification.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Calm-alpha-apks
          path: |
            dist/Calm-alpha-*.apk
          if-no-files-found: error

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: Calm-alpha-release-assets
          path: |
            release-assets/*.apk
          if-no-files-found: error

      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: Calm-alpha-release-metadata
          path: |
            release-metadata/*.md
            release-metadata/*.env
            release-assets/*.apksigner.txt
            release-assets/*.badging.txt
          if-no-files-found: error

  publish:
    name: Publish latest APK release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: Calm-alpha-release-assets
          path: release-assets

      - name: Download release metadata
        uses: actions/download-artifact@v4
        with:
          name: Calm-alpha-release-metadata
          path: release-metadata

      - name: Load APK version
        run: |
          set -euo pipefail
          version_file="$(find release-metadata -name version.env | head -n 1)"
          if [[ -z "${version_file}" ]]; then
            echo "Missing APK version metadata." >&2
            exit 1
          fi
          source "${version_file}"
          echo "VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_ENV"
          echo "VERSION_NAME=${VERSION_NAME}" >> "$GITHUB_ENV"

      - name: Generate release notes
        run: |
          set -euo pipefail
          {
            echo "Alpha build for commit \`${GITHUB_SHA}\`."
            echo
            echo "Built from branch \`${GITHUB_REF_NAME}\` via \`${GITHUB_EVENT_NAME}\`."
            echo
            echo "Version: \`${VERSION_NAME}\` / code \`${VERSION_CODE}\`."
            echo
            echo "### Which APK should I install?"
            echo "- **Calm-alpha-latest.apk** updates the existing Calm install using package \`dev.barna.calm\`. Use this for normal alpha testing."
            echo "- **Calm-alpha-debug-side-by-side-latest.apk** installs separately using package \`dev.barna.calm.debug\`. Use this only when you intentionally want a second test copy."
            echo "- The normal alpha APK includes Android signing-certificate rotation from the old CI alpha key to the current release key, so existing alpha installs can update on Android 9 and newer."
            echo "- If Android still reports **App not installed**, uninstall the existing \`dev.barna.calm\` app once, then install \`Calm-alpha-latest.apk\`; this is expected only for devices that cannot use signing-certificate rotation or have a differently signed local build installed."
            echo "- This release is pruned on every publish, so only the current versioned APKs and latest aliases are attached."
            echo
            metadata_file="$(find release-metadata -name apk-verification.md | head -n 1)"
            if [[ -z "${metadata_file}" ]]; then
              echo "Missing APK verification metadata." >&2
              exit 1
            fi
            cat "${metadata_file}"
            echo
            echo "### Recent changes"
            git log -10 --pretty=format:'- %s (%h)'
            echo
          } > release-notes.md

      - name: Publish latest APK release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || 'apks-latest' }}
          RELEASE_TITLE: ${{ github.event_name == 'workflow_dispatch' && inputs.release_title || 'Latest Calm Alpha APKs' }}
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TITLE}" \
              --notes-file release-notes.md \
              --prerelease \
              --target "$GITHUB_SHA"
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TITLE}" \
              --notes-file release-notes.md \
              --prerelease \
              --target "$GITHUB_SHA"
          fi

          apk_assets="$(gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name' | grep -E '^Calm-alpha.*\.apk$' || true)"
          if [[ -n "${apk_assets}" ]]; then
            while read -r asset_name; do
              gh release delete-asset "${RELEASE_TAG}" "${asset_name}" --yes
            done <<< "${apk_assets}"
          fi

          gh release upload "${RELEASE_TAG}" release-assets/*.apk --clobber
