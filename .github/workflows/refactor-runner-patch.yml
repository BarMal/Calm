name: Temporary Runner Refactor Patch

on:
  push:
    branches:
      - refactor/decompose-runner-incremental
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-runner:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: refactor/decompose-runner-incremental
          fetch-depth: 0

      - name: Patch runner call sites
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          path = Path('app/src/main/java/dev/barna/calm/CalmLauncherRunner.kt')
          text = path.read_text()

          def replace_once(old: str, new: str):
              global text
              if old not in text:
                  raise SystemExit(f'Expected block not found:\n{old[:240]}')
              text = text.replace(old, new, 1)

          field_anchor = '    private val cardStackController = CardStackController(activity, mainHandler, ::performCardScrollHaptic)\n'
          if 'private val pinnedAppResolver = PinnedAppResolver()' not in text:
              text = text.replace(
                  field_anchor,
                  field_anchor +
                  '    private val pinnedAppResolver = PinnedAppResolver()\n' +
                  '    private val chapterPagePlanner = ChapterPagePlanner()\n' +
                  '    private val appLibraryFilter = AppLibraryFilter()\n' +
                  '    private val appCardModelFactory = AppCardModelFactory()\n',
                  1,
              )

          replace_once('''    private fun buildPages(state: LauncherUiState): List<ChapterPage> {
        val pages = ArrayList<ChapterPage>()
        var chapterNumber = 1
        val (workChapters, standardChapters) = if (state.preferences.placeWorkNotificationChaptersBeforeApps) {
            state.notificationChapters.partition { it.isWorkProfile }
        } else {
            emptyList<AppChapter>() to state.notificationChapters
        }

        workChapters.forEach { chapter ->
            pages.add(ChapterPage.notifications(chapter, roman(chapterNumber)))
            chapterNumber++
        }

        if (state.preferences.splitAppsByProfile) {
            if (state.appEntries.any { it.isWorkProfile }) {
                pages.add(ChapterPage.workApps(CalmTheme.WORK_APP_LIBRARY_KEY, roman(chapterNumber)))
                chapterNumber++
            }
            pages.add(ChapterPage.personalApps(CalmTheme.PERSONAL_APP_LIBRARY_KEY, roman(chapterNumber)))
            chapterNumber++
        } else {
            pages.add(ChapterPage.appLibrary(CalmTheme.APP_LIBRARY_KEY).withMarker(roman(chapterNumber)))
            chapterNumber++
        }

        if (state.pinnedApps.isNotEmpty()) {
            pages.add(ChapterPage.pinned(CalmTheme.PINNED_KEY, roman(chapterNumber)))
            chapterNumber++
        }
        pages.add(ChapterPage.overview(CalmTheme.OVERVIEW_KEY).withMarker(roman(chapterNumber)))
        chapterNumber++
        standardChapters.forEach { chapter ->
            pages.add(ChapterPage.notifications(chapter, roman(chapterNumber)))
            chapterNumber++
        }
        return pages
    }
''', '''    private fun buildPages(state: LauncherUiState): List<ChapterPage> {
        return chapterPagePlanner.buildPages(
            preferences = state.preferences,
            notificationChapters = state.notificationChapters,
            appEntries = state.appEntries,
            pinnedApps = state.pinnedApps,
        )
    }
''')

          text = text.replace('''            val pinnedApps = if (pinnedKeys.isEmpty()) {
                emptyList()
            } else {
                appEntries.filter { app -> app.identityKey in pinnedKeys || app.packageName in pinnedKeys }
            }
''', '''            val pinnedApps = pinnedAppResolver.resolve(appEntries, pinnedKeys)
''', 1)

          text = text.replace('''        val pinnedApps = if (pinnedKeys.isEmpty()) {
            emptyList()
        } else {
            appEntries.filter { app -> app.identityKey in pinnedKeys || app.packageName in pinnedKeys }
        }
''', '''        val pinnedApps = pinnedAppResolver.resolve(appEntries, pinnedKeys)
''', 1)

          replace_once('''            addView(label(appLibrarySubtitle(scope), 15, CalmTheme.MUTED_INK, Typeface.NORMAL).apply {
                setPadding(0, activity.dp(6), 0, activity.dp(18))
            })
''', '''            appLibrarySubtitle(scope)?.let { subtitle ->
                addView(label(subtitle, 15, CalmTheme.MUTED_INK, Typeface.NORMAL).apply {
                    setPadding(0, activity.dp(6), 0, activity.dp(18))
                })
            }
''')

          replace_once('''    private fun appLibrarySubtitle(scope: AppLibraryScope): String {
        return when (scope) {
            AppLibraryScope.ALL -> "Search, launch, and pin apps into the launcher spine."
            AppLibraryScope.PERSONAL -> "Personal apps stay separate from work when profile splitting is enabled."
            AppLibraryScope.WORK -> "Work-profile apps keep their own launch and notification identity."
        }
    }
''', '''    private fun appLibrarySubtitle(scope: AppLibraryScope): String? {
        return appLibraryFilter.subtitle(scope)
    }
''')

          replace_once('''        val filtered = appEntries.filter { app ->
            when (scope) {
                AppLibraryScope.ALL -> true
                AppLibraryScope.PERSONAL -> !app.isWorkProfile
                AppLibraryScope.WORK -> app.isWorkProfile
            }
        }.filter { app ->
            val normalizedQuery = query.trim()
            normalizedQuery.isBlank() ||
                app.label.contains(normalizedQuery, ignoreCase = true) ||
                app.packageName.contains(normalizedQuery, ignoreCase = true) ||
                app.profileLabel.contains(normalizedQuery, ignoreCase = true)
        }
''', '''        val filtered = appLibraryFilter.filter(appEntries, scope, query)
''')

          text = text.replace('appSearchEmptyStack(emptyAppsMessage(scope, query))', 'appSearchEmptyStack(appLibraryFilter.emptyMessage(scope, query))', 1)

          replace_once('''    private fun emptyAppsMessage(scope: AppLibraryScope, query: String): String {
        if (query.isNotBlank()) return "No apps match that search."
        return when (scope) {
            AppLibraryScope.ALL -> "No apps are available."
            AppLibraryScope.PERSONAL -> "No personal apps are available."
            AppLibraryScope.WORK -> "No work apps are available."
        }
    }

''', '')

          replace_once('''    private fun isPinned(app: AppEntry): Boolean {
        val pinned = currentUiState?.pinnedKeys ?: settings.pinnedPackages()
        return app.identityKey in pinned || app.packageName in pinned
    }
''', '''    private fun isPinned(app: AppEntry): Boolean {
        val pinned = currentUiState?.pinnedKeys ?: settings.pinnedPackages()
        return pinnedAppResolver.isPinned(app, pinned)
    }
''')

          replace_once('''    private fun appCard(app: AppEntry): TextView {
        val pinned = isPinned(app)
        val profileLine = if (app.isWorkProfile) "\nWork" else ""
        val icon = notificationRepository.resolveAppIcon(app, cardHeight())?.bitmap
        return stackCard("${app.label}$profileLine${if (pinned) "\nPinned" else ""}", app.hueColor, true, icon).apply {
            maxLines = 4
            setOnClickListener { openAppEntry(app) }
            setOnLongClickListener {
                focusOverlay.show(this, appContextActions(app), app.label)
                true
            }
        }
    }
''', '''    private fun appCard(app: AppEntry): TextView {
        val model = appCardModelFactory.create(app, currentUiState?.pinnedKeys ?: settings.pinnedPackages())
        val icon = notificationRepository.resolveAppIcon(app, cardHeight())?.bitmap
        return stackCard(model.text, model.hueColor, true, icon).apply {
            maxLines = 4
            setOnClickListener { openAppEntry(model.app) }
            setOnLongClickListener {
                focusOverlay.show(this, appContextActions(model.app), model.app.label)
                true
            }
        }
    }
''')

          path.write_text(text)
          PY

      - name: Commit runner refactor
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/dev/barna/calm/CalmLauncherRunner.kt
          if git diff --cached --quiet; then
            echo "No runner changes to commit"
          else
            git commit -m "Wire extracted launcher models into runner"
            git push origin HEAD:refactor/decompose-runner-incremental
          fi
